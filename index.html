<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOLTMASTER PRO v1.7.8 | ST-BALANCED</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root { --bg:#020617; --card:#111827; --accent:#22c55e; --text:#94a3b8; --border:#334155; --pro:#f59e0b; --err:#ef4444; }
body{margin:0;font-family: Arial, sans-serif;background:var(--bg);color:white;padding-bottom:50px;}
header{text-align:center;padding:25px;background:#0f172a;border-bottom:4px solid var(--pro);}
header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 1px; }
header p { margin: 5px 0 0 0; color: var(--pro); font-weight: bold; font-size: 0.8rem; text-transform: uppercase;}
.container{max-width:1100px;margin:auto;padding:10px;}
.card{background:var(--card);padding:15px;border-radius:12px;margin-top:15px;border:1px solid var(--border);}
h3{margin-top:0;color:var(--accent);font-size:1rem;border-bottom:1px solid var(--border);padding-bottom:5px;margin-bottom:10px;}
.grid{display:grid;grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));gap:10px;margin-bottom:10px;}
input,select{width:100%;padding:8px;background:#0f172a;color:white;border:1px solid var(--border);border-radius:4px;box-sizing: border-box;font-size:0.85rem;}
button{width:100%;padding:15px;margin-top:15px;background:var(--accent);border:none;font-weight:bold;cursor:pointer;border-radius:4px;font-size:1rem;color:#020617;}
.result{white-space:pre-wrap;margin-top:20px;background:#000;padding:25px;display:none;border-radius:8px;font-family: 'Courier New', monospace;font-size:0.85rem;border:1px solid var(--accent);line-height:1.4;}
label{font-size:0.7rem;color:var(--text);display:block;margin-bottom:3px;}
.settings-panel { background: #1e293b; padding: 15px; border-radius: 8px; border-left: 4px solid var(--pro); margin-top: 15px; }
.ac-group { border: 1px dashed var(--border); padding: 8px; border-radius: 4px; margin-top: 5px; }
.validation-msg { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--err); color: var(--err); padding: 10px; border-radius: 6px; margin-top: 15px; display: none; font-size: 0.8rem; }
</style>
</head>
<body>

<header>
    <h1>VOLTMASTER PRO <span class="badge">v1.7.8 ENGINEER</span></h1>
    <p>Professional Electrical Design & Compliance Suite</p>
</header>

<div class="container">
    <div class="card">
        <h3>1. Project & Branding</h3>
        <div class="grid">
            <div><label>Company Name</label><input id="compName" placeholder="Volt Solutions Sdn Bhd" type="text"></div>
            <div><label>Prepared By</label><input id="prepBy" placeholder="Firdaus" type="text"></div>
            <div><label>Project Ref</label><input id="projRef" placeholder="PROJ/2026/001" type="text"></div>
        </div>
    </div>

    <div class="settings-panel">
        <h3 style="color:var(--pro); border-color:var(--pro)">Pro Setting: Dynamic Pricing (RM)</h3>
        <div class="grid">
            <div><label>Light/Fan Pt</label><input id="rateL" value="85" type="number"></div>
            <div><label>Exhaust Fan Pt</label><input id="rateEF" value="95" type="number"></div>
            <div><label>Socket Point</label><input id="rateS" value="160" type="number"></div>
            <div><label>Aircond Point</label><input id="rateAC" value="250" type="number"></div>
            <div><label>Water Heater Pt</label><input id="rateWH" value="280" type="number"></div>
            <div><label>Outdoor Light Pt</label><input id="rateOL" value="120" type="number"></div>
            <div><label>DB Base Rate</label><input id="rateDB" value="650" type="number"></div>
        </div>
    </div>

    <div class="card">
        <h3>2. System Configuration</h3>
        <div class="grid">
            <div><label>Supply System</label><select id="phaseType" onchange="validateInput()"><option value="1">1-Phase (230V)</option><option value="3">3-Phase (400V)</option></select></div>
            <div><label>Diversity (DF)</label><input id="pDF" value="Auto" disabled style="background:#0f172a; color:var(--pro); font-weight:bold;"></div>
            <div><label>Power Factor</label><input id="pPF" value="0.85" step="0.05" type="number"></div>
            <div><label>Wiring Style</label><select id="wireStyle"><option value="conduit">High Impact Conduit (ST Std)</option><option value="concealed">Concealed Wiring</option><option value="trunking">Steel Trunking</option></select></div>
        </div>
    </div>

    <div class="card">
        <h3>3. Load Quantities</h3>
        <div class="grid">
            <div><label>Lighting</label><input id="qL" value="10" type="number" oninput="validateInput()"></div>
            <div><label>Ceiling Fan</label><input id="qF" value="5" type="number" oninput="validateInput()"></div>
            <div><label>Exhaust Fan</label><input id="qEF" value="0" type="number" oninput="validateInput()"></div>
            <div><label>Socket Pts</label><input id="qS" value="12" type="number" oninput="validateInput()"></div>
            <div><label>Water Heater</label><input id="qWH" value="1" type="number" oninput="validateInput()"></div>
            <div><label>Outdoor Light</label><input id="qOL" value="2" type="number" oninput="validateInput()"></div>
        </div>
        <div class="grid">
            <div class="ac-group"><label>AC 1 (HP)</label><input id="hp1" value="1.0" step="0.5" type="number" oninput="validateInput()"><label>Qty</label><input id="qty1" value="1" type="number" oninput="validateInput()"></div>
            <div class="ac-group"><label>AC 2 (HP)</label><input id="hp2" value="1.5" step="0.5" type="number" oninput="validateInput()"><label>Qty</label><input id="qty2" value="0" type="number" oninput="validateInput()"></div>
            <div class="ac-group"><label>AC 3 (HP)</label><input id="hp3" value="2.5" step="0.5" type="number" oninput="validateInput()"><label>Qty</label><input id="qty3" value="0" type="number" oninput="validateInput()"></div>
        </div>
    </div>

    <div class="card">
        <h3>4. Technical Parameters</h3>
        <div class="grid">
            <div><label>Earthing System</label><select id="earthType"><option value="TT">TT (Standard Malaysia)</option><option value="TN-S">TN-S</option><option value="TN-C-S">TN-C-S (PME)</option></select></div>
            <div><label>Earth Resistance (Ω)</label><input id="earthRes" value="1.0" type="number" step="0.1"></div>
            <div><label>Ambient Temp (°C)</label><select id="tempCa"><option value="0.87">40°C (Standard MS)</option><option value="0.94">35°C</option><option value="1.0">30°C</option><option value="0.79">45°C</option></select></div>
            <div><label>Grouping (Circuits)</label><select id="groupCg"><option value="1.0">1 Circuit</option><option value="0.8">2 Circuits</option><option value="0.7">3 Circuits</option><option value="0.65">4 Circuits</option><option value="0.5">9+ Circuits</option></select></div>
        </div>
        <div class="grid">
            <div><label>Light (W)/unit</label><input id="wL" value="15" type="number" oninput="validateInput()"></div>
            <div><label>Fan (W)/unit</label><input id="wF" value="75" type="number" oninput="validateInput()"></div>
            <div><label>Exhaust (W)/unit</label><input id="wEF" value="40" type="number" oninput="validateInput()"></div>
            <div><label>Outdoor Light (W)/unit</label><input id="wOL" value="30" type="number" oninput="validateInput()"></div>
            <div><label>Heater (W)/unit</label><input id="wWH" value="3000" type="number" oninput="validateInput()"></div>
            <div><label>Max. Length (m)</label><input id="cLen" value="30" type="number" oninput="validateInput()"></div>
        </div>
        <div class="grid">
            <div><label>Socket Mode</label><select id="pS"><option value="10">Ring Main (2.5mm² Cable / 32A MCB)</option><option value="2">Radial (4.0mm² Cable / 20A MCB)</option></select></div>
        </div>

        <div id="vMsg" class="validation-msg"></div>
         
        <button id="genBtn" onclick="calc()">GENERATE PROFESSIONAL COMPLIANCE REPORT</button>
        <div id="out" class="result"></div>

     <button id="pdfBtn" style="background:#334155;color:white;display:none;margin-top:10px;" onclick="pdf()">EXPORT MULTI-PAGE PDF REPORT</button>

<button id="resetBtn" style="background:var(--err);color:white;margin-top:10px;" onclick="resetBorang()">MULAKAN PROJEK BARU (RESET)</button>

    </div>
</div>

<script>
const breakers = [32, 40, 63, 80, 100, 125];
const mvAM = { "1.5": 29, "2.5": 18, "4.0": 11, "6.0": 7.3, "10.0": 4.4, "16.0": 2.8, "25.0": 1.8, "35.0": 1.35 };

const resCu = { "1.5": 12.10, "2.5": 7.41, "4.0": 4.61, "6.0": 3.08, "10.0": 1.83, "16.0": 1.15, "25.0": 0.727, "35.0": 0.524 };

function validateInput() {
    const vMsg = document.getElementById('vMsg');
    let errors = [];
    const getVal = (id) => parseFloat(document.getElementById(id).value) || 0;
    const phase = document.getElementById('phaseType').value;
    const len = getVal('cLen');

    let tcl = (getVal('qL')*getVal('wL')) + (getVal('qF')*getVal('wF')) + (getVal('qEF')*getVal('wEF')) + (getVal('qOL')*getVal('wOL')) + (getVal('qS')*250) + (getVal('qWH')*getVal('wWH'));
    let acW = (getVal('hp1')*getVal('qty1')*746) + (getVal('hp2')*getVal('qty2')*746) + (getVal('hp3')*getVal('qty3')*746);
    tcl += acW;
    
    let ibVal = (phase == "1") ? (tcl / (230 * 0.85)) : (tcl / (1.732 * 400 * 0.85));

    if(phase == "1" && ibVal > 50) errors.push("CRITICAL: Load exceeds 1-Phase limit (50A). Upgrade to 3-Phase supply required.");
    if(len > 65) errors.push("WARNING: Cable length > 65m. Potential Voltage Drop violation (>4%).");
    
    if(errors.length > 0) { 
        vMsg.style.display = "block"; 
        vMsg.innerHTML = "<b>⚠️ ST COMPLIANCE ALERTS:</b><br>" + errors.map(e => "• " + e).join("<br>"); 
    } else { vMsg.style.display = "none"; }
}

function getACSpecs(hp) {
    if (hp <= 1.5) return { mcb: "16A", cable: "2.5mm²", val: 2.5 };
    if (hp <= 2.5) return { mcb: "20A", cable: "4.0mm²", val: 4.0 };
    return { mcb: "32A", cable: "6.0mm²", val: 6.0 };
}

function getContainmentSizing(cableSize, style) {
    if (style === "concealed") return "";
    if (cableSize <= 2.5) return style === "conduit" ? "Rec. Conduit: 20mm (High Impact)" : "Rec. Trunking: 50x50mm (Steel)";
    if (cableSize <= 6.0) return style === "conduit" ? "Rec. Conduit: 25mm (High Impact)" : "Rec. Trunking: 75x75mm (Steel)";
    return style === "conduit" ? "Rec. Conduit: 32mm" : "Rec. Trunking: 100x100mm";
}

function calc() {
    try {
        const getV = (id) => {
            const el = document.getElementById(id);
            return el ? (isNaN(parseFloat(el.value)) ? el.value : parseFloat(el.value)) : 0;
        };

        const phase = getV('phaseType');
        const wStyle = document.getElementById('wireStyle').value;
        const len = getV('cLen');
        const pf = getV('pPF');
        const vBase = (phase == "1" ? 230 : 400);
        const ca = getV('tempCa');
        const cg = getV('groupCg');
        
        const loadL = getV('qL') * getV('wL'), loadF = getV('qF') * getV('wF'), loadEF = getV('qEF') * getV('wEF'),
              loadOL = getV('qOL') * getV('wOL'), loadS = getV('qS') * 250, loadWH = getV('qWH') * getV('wWH');
        
        let acTotalW = 0, acQty = 0, acArray = [];
        for(let i=1; i<=3; i++){
            let h = getV('hp'+i), q = getV('qty'+i);
            if(q > 0){
                let w = h * 746; acTotalW += (w * q); acQty += q;
                for(let j=0; j<q; j++) acArray.push(w);
            }
        }

        const TCL = loadL + loadF + loadEF + loadOL + loadS + loadWH + acTotalW;
        const mdL = (loadL + loadF + loadEF + loadOL) * 0.66;
        const sCcts = Math.ceil(getV('qS') / getV('pS'));
        const mdS = sCcts > 0 ? (250 * getV('pS')) + ((sCcts - 1) * (250 * getV('pS')) * 0.4) : 0;
        
        let fixedAppliances = [];
        if(getV('qWH') > 0) for(let i=0; i<getV('qWH'); i++) fixedAppliances.push(getV('wWH'));
        fixedAppliances = fixedAppliances.concat(acArray).sort((a,b) => b-a);
        let mdFixed = 0;
        fixedAppliances.forEach((watt, index) => { if(index < 2) mdFixed += watt; else mdFixed += (watt * 0.25); });

        const MD = mdL + mdS + mdFixed;
        const autoDF = (MD / (TCL||1)).toFixed(2);
        document.getElementById('pDF').value = autoDF;

        const Ib = (phase == "1") ? MD / (230 * pf) : MD / (1.732 * 400 * pf);
        
        // PENGIRAAN ARUS BERKESAN (Effective Current It)
        const It = Ib / (ca * cg);

        let mainS = breakers.find(b => b >= (It * 1.25)) || 63;
        if (phase == "1" && mainS < 32) mainS = 32; 
        if (phase == "3" && mainS < 40) mainS = 40; 

        const mainCab = (mainS <= 32) ? 6 : (mainS <= 40) ? 10 : (mainS <= 63) ? 16 : (mainS <= 80) ? 25 : 35;
        const earthCab = (mainCab <= 16) ? mainCab : (mainCab <= 35) ? 16 : 25;

        const mvMain = mvAM[mainCab.toFixed(1)] || 2.8;
        
        // PEMBETULAN FORMULA VD 3-FASA: Guna 1.732 (sqrt 3) untuk 400V
        const factor3f = (phase == "3") ? 1.732 : 1.0;
        const vDropMain = (mvMain * Ib * len * factor3f) / 1000;
        const vDropPctMain = (vDropMain / vBase) * 100;

        const earthType = document.getElementById('earthType').value;
        const earthRes = getV('earthRes');
        
        const r1Val = resCu[mainCab.toFixed(1)] || 1.15; 
        const r2Val = resCu[earthCab.toFixed(1)] || 1.15; 
        const r1r2 = ((r1Val + r2Val) * len * 1.2) / 1000; 

        let ze = 0;
        if (earthType === "TT") ze = earthRes;
        else if (earthType === "TN-S") ze = 0.8;
        else if (earthType === "TN-C-S") ze = 0.35;

        let zs = ze + r1r2;
        const zsLimit = 230 / (mainS * 10); 
        const zsStatus = zs <= zsLimit ? "PASSED" : "FAILED";

        const pefc = (230 / zs) / 1000; 
        const zeLN = 0.35; 
        const r1rn = ((r1Val + r1Val) * len * 1.2) / 1000; 
        const psc = (230 / (zeLN + r1rn)) / 1000; 

        const breakingCapacity = mainS <= 63 ? 6 : 10;
        const maxFault = Math.max(pefc, psc);
        const pscStatus = maxFault <= breakingCapacity ? "ADEQUATE" : "INADEQUATE";

        let earthNote = "";
        if (zsStatus === "FAILED") {
            if (earthType === "TT") {
                earthNote = `REMARKS (TT SYSTEM): Loop Impedance Zs failed. MCB may not provide 
fault protection. RCD protection is MANDATORY as per Regulation 36(2) 
of Electricity Regulations 1994.`;
            } else {
                earthNote = `CRITICAL REMARKS (${earthType} SYSTEM): High Loop Impedance detected. 
In TN systems, this indicates a weak return path to the source. 
MCB magnetic trip is UNRELIABLE. Immediate check on earth bonding 
and RCD sensitivity (10mA/30mA/100mA) is required for safety compliance.`;
            }
        }

        let stWarnings = [];
        if(zsStatus === "FAILED") stWarnings.push(`CRITICAL: Loop Impedance (Zs) is ${zs.toFixed(2)}Ω. Standard MCB trip may FAIL.`);
        if(vDropPctMain > 4) stWarnings.push("CRITICAL: Voltage Drop exceeds 4% (Non-compliant with ST).");
        if(pscStatus === "INADEQUATE") stWarnings.push("CRITICAL: Breaking capacity insufficient for fault level.");

        const vMsg = document.getElementById('vMsg');
        if(stWarnings.length > 0){
            vMsg.style.display = "block";
            vMsg.innerHTML = "<b>⚠️ ST CRITICAL WARNINGS:</b><br>" + stWarnings.map(e => "• " + e).join("<br>");
        }

        let phaseLoads = { R: 0, Y: 0, B: 0 };
        let allCircuits = [];

        const queueCct = (qty, ptsPerCct, watt, label) => {
            if (qty <= 0) return;
            const numCcts = Math.ceil(qty / (ptsPerCct || 1));
            const loadPerCct = watt * (qty / numCcts);
            for(let i=0; i<numCcts; i++) {
                allCircuits.push({ label: label, watt: loadPerCct });
            }
        };

        queueCct(getV('qL'), 10, getV('wL'), "Lighting");
        queueCct(getV('qF'), 10, getV('wF'), "Ceiling Fan");
        queueCct(getV('qEF'), 10, getV('wEF'), "Exhaust Fan");
        queueCct(getV('qOL'), 10, getV('wOL'), "Outdoor Light");
        if(getV('qS') > 0) queueCct(getV('qS'), getV('pS'), 250, "Socket Outlet");
        for(let i=1; i<=3; i++) {
            let h = getV('hp'+i), q = getV('qty'+i);
            if(q > 0) queueCct(q, 1, h*746, `AC ${h}HP`);
        }
        if(getV('qWH') > 0) queueCct(getV('qWH'), 1, getV('wWH'), "Water Heater");

        allCircuits.sort((a, b) => b.watt - a.watt);

        allCircuits.forEach(cct => {
            let lightest = 'R';
            if (phaseLoads.Y < phaseLoads[lightest]) lightest = 'Y';
            if (phaseLoads.B < phaseLoads[lightest]) lightest = 'B';
            phaseLoads[lightest] += cct.watt;
        });

        let balancingReport = "";
        if (phase == "3") {
            let maxP = Math.max(phaseLoads.R, phaseLoads.Y, phaseLoads.B);
            let minP = Math.min(phaseLoads.R, phaseLoads.Y, phaseLoads.B);
            balancingReport = `
[PHASE LOADING ANALYSIS (AUTO-BALANCED)]
------------------------------------------------------------
Red Phase (R)   : ${(phaseLoads.R / 1000).toFixed(2)} kW
Yellow Phase (Y): ${(phaseLoads.Y / 1000).toFixed(2)} kW
Blue Phase (B)  : ${(phaseLoads.B / 1000).toFixed(2)} kW
Max Imbalance   : ${((maxP - minP) / 1000).toFixed(2)} kW
------------------------------------------------------------\n`;
        }

        let totalMCB = 0, circuitLines = "";

        const getVdLine = (watt, cableVal, len, ph) => {
            const iLine = watt / (230 * pf); 
            const mvLine = mvAM[cableVal.toFixed(1)] || 29;
            const vdVal = (mvLine * iLine * len) / 1000;
            const vdPct = (vdVal / 230) * 100;
            return { v: vdVal.toFixed(2), pct: vdPct.toFixed(2) };
        };

        const genR = (qty, label, rating, ptsPerCct, mcb, cable, cableVal, rcd = "100mA") => {
            if (qty <= 0) return "";
            const circuits = Math.ceil(qty / ptsPerCct); 
            totalMCB += circuits;
            const vdObj = getVdLine(rating * (qty/circuits), cableVal, len, phase);
            let cont = getContainmentSizing(cableVal, wStyle);
            return `${label}\n   - Rating: ${rating}W/unit | Qty: ${qty}\n   - MCB: ${mcb} (6kA) | Cable: ${cable} | RCD: ${rcd} | Circuits: ${circuits}\n   - Estimated VD: ${vdObj.v}V (${vdObj.pct}%)\n${cont?`     ${cont}\n`:''}\n`;
        };

        circuitLines += genR(getV('qL'), "A. LIGHTING", getV('wL'), 10, "6A", "1.5mm²", 1.5);
        circuitLines += genR(getV('qF'), "B. CEILING FANS", getV('wF'), 10, "10A", "1.5mm²", 1.5);
        circuitLines += genR(getV('qEF'), "C. EXHAUST FANS", getV('wEF'), 10, "6A", "1.5mm²", 1.5);
        circuitLines += genR(getV('qOL'), "D. OUTDOOR LIGHTS", getV('wOL'), 10, "6A", "1.5mm²", 1.5, "30mA (Dedicated)");
        
        if(getV('qS') > 0) {
            const socketMode = getV('pS'); 
            const sCircuits = Math.ceil(getV('qS') / socketMode); 
            totalMCB += sCircuits;
            let sMCB = (socketMode == 10) ? "32A (Ring)" : "20A (Radial)";
            let sCable = (socketMode == 10) ? "2.5mm²" : "4.0mm²";
            let sCableVal = (socketMode == 10) ? 2.5 : 4.0;
            const sVd = getVdLine(250 * socketMode, sCableVal, len, phase);
            circuitLines += `E. SOCKET OUTLETS\n   - Rating: 250W/pt | Qty: ${getV('qS')}\n   - MCB: ${sMCB} (6kA) | Cable: ${sCable} | RCD: 30mA | Circuits: ${sCircuits}\n   - Estimated VD: ${sVd.v}V (${sVd.pct}%)\n${getContainmentSizing(sCableVal, wStyle)?`     ${getContainmentSizing(sCableVal, wStyle)}\n`:''}\n`;
        }
        if(acQty > 0) {
            circuitLines += `F. AIR-CONDITIONING\n`;
            for(let i=1; i<=3; i++) {
                let h = getV('hp'+i), q = getV('qty'+i);
                if(q > 0) { 
                    totalMCB += q; 
                    let s = getACSpecs(h); 
                    const acVd = getVdLine(h*746, s.val, len, phase);
                    circuitLines += `   - ${h}HP Unit | Qty: ${q} | MCB: ${s.mcb} (6kA) | Cable: ${s.cable} | Circuits: ${q} | VD: ${acVd.v}V (${acVd.pct}%)\n`; 
                }
            }
            circuitLines += `\n`;
        }
        if(getV('qWH') > 0) {
            let whQ = getV('qWH'); totalMCB += whQ;
            const whVd = getVdLine(getV('wWH'), 4.0, len, phase);
            circuitLines += `G. WATER HEATER\n   - Rating: ${getV('wWH')}W/unit | Qty: ${whQ}\n   - MCB: 20A (6kA) | Cable: 4.0mm² | RCD: 10mA | Circuits: ${whQ}\n   - Estimated VD: ${whVd.v}V (${whVd.pct}%)\n${getContainmentSizing(4.0, wStyle)?`     ${getContainmentSizing(4.0, wStyle)}\n`:''}\n`;
        }

        let dbRec = "";
        if (phase == "1") {
            const dbSize = totalMCB <= 10 ? "14 Way" : totalMCB <= 16 ? "18 Way" : totalMCB <= 22 ? "24 Way" : totalMCB <= 32 ? "36 Way" : "42 Way";
            dbRec = `${dbSize} SPN DB (Metal/PVC)`;
        } else {
            const tpnWays = Math.ceil((totalMCB * 1.25) / 3); 
            const stdWays = tpnWays <= 4 ? 4 : tpnWays <= 6 ? 6 : tpnWays <= 8 ? 8 : tpnWays <= 12 ? 12 : 16;
            dbRec = `${stdWays}-Way TPN DB (Memuatkan ${stdWays * 3} MCB) (Metal/PVC)`;
        }
        let costPoints = ( (getV('qL')+getV('qF')) * getV('rateL') ) + ( getV('qEF') * getV('rateEF') ) + ( getV('qOL') * getV('rateOL') ) + ( getV('qS') * getV('rateS') ) + ( acQty * getV('rateAC') ) + ( getV('qWH') * getV('rateWH') ) + getV('rateDB');

        const report = `============================================================
              ${(getV('compName') || "VOLTMASTER PRO").toUpperCase()}
              ST COMPLIANCE TECHNICAL REPORT (V1.7.8)
============================================================
REF NO    : ${getV('projRef') || "PROJ-" + new Date().getTime()}
PREPARED BY: ${getV('prepBy') || "SYSTEM"}
DATE      : ${new Date().toLocaleDateString('en-GB')}
SYSTEM    : ${phase}-PHASE | PF: ${pf} | WIRING: ${wStyle.toUpperCase()}
FACTORS   : Ambient Ca: ${ca} | Grouping Cg: ${cg}
------------------------------------------------------------
[1. INDIVIDUAL CIRCUIT DETAILS]
------------------------------------------------------------
${circuitLines}
[2. DB & PROTECTION]
------------------------------------------------------------
Main Switch    : ${mainS}A (${phase == "1" ? "DP" : "TPN"}) (10kA)
Incoming Cable : ${mainCab}mm² (Cu/PVC/PVC)
Earth Cable    : ${earthCab}mm² (Cu/PVC) - As per MS 1979
Main RCD       : ${mainS}A / 100mA Sensitivity (Type A/S)
RCD (Outdoor)  : 30mA Sensitivity (ST Requirement)
RCD (Heater)   : 10mA Sensitivity (ST Requirement)
Recommended DB : ${dbRec}
Total MCB Ways : ${totalMCB} + 25% Spare

[3. DESIGN SUMMARY]
------------------------------------------------------------
Total Connected Load (TCL) : ${(TCL/1000).toFixed(2)} kW
Maximum Demand (MD)        : ${(MD/1000).toFixed(2)} kW
Auto Diversity Factor      : ${autoDF}
Main Voltage Drop          : ${vDropMain.toFixed(2)}V (${vDropPctMain.toFixed(2)}%)
Status                     : ${vDropPctMain <= 4 ? 'PASSED (COMPLIANT)' : 'FAILED (NON-COMPLIANT)'}
${balancingReport}
[4. EARTHING & FAULT ANALYSIS]
------------------------------------------------------------
Earthing System            : ${earthType}
External Impedance (Ze)    : ${ze.toFixed(2)} Ohm
Estimated Loop Zs          : ${zs.toFixed(2)} Ohm
Zs Limit (MCB)             : ${zsLimit.toFixed(2)} Ohm
Zs Status                  : ${zsStatus}

Prospective Fault Current  : ${psc.toFixed(2)} kA
Breaking Capacity Check    : ${breakingCapacity} kA
Protection Status          : ${pscStatus}

${earthNote}

[ST COMPLIANCE WARNINGS]
------------------------------------------------------------
${stWarnings.length ? stWarnings.map(w => "• " + w).join("\n") : "No critical issues detected."}

[5. ESTIMATED COMMERCIAL VALUATION]
------------------------------------------------------------
ESTIMATED TOTAL: RM ${costPoints.toLocaleString()}
*DISCLAIMER: Labor & Installation estimate only. Excludes material 
costs, official permit fees, and site complexities.*

------------------------------------------------------------

------------------------------------------------------------
This report is generated based on MS 1979 and ST guidelines. 
Final design must be verified and endorsed by a Competent 
Person (Wireman/PW4 or Electrical Engineer) before installation.
------------------------------------------------------------`;

        document.getElementById('out').style.display = "block";
        document.getElementById('out').innerText = report;
        document.getElementById('pdfBtn').style.display = "block";
    } catch (e) { alert("Error: " + e.message); }
}

async function pdf() {
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF('p', 'mm', 'a4');
    const lines = doc.splitTextToSize(document.getElementById('out').innerText, 180);
    let y = 20;
    doc.setFont("courier", "bold"); doc.setFontSize(10);
    doc.text("ELECTRICAL COMPLIANCE REPORT - DESIGN CONSULTANCY", 15, 12);
    doc.setFont("courier", "normal"); doc.setFontSize(9);
    lines.forEach((line) => {
        if (y > 275) { doc.addPage(); y = 20; }
        doc.text(line, 15, y); y += 5;
    });
    doc.save("VoltMaster_v1.7.8_Report.pdf");
}
function resetBorang() {
    if (confirm("Adakah anda pasti untuk mengosongkan semua data dan memulakan projek baru?")) {
        window.location.reload();
    }
}
